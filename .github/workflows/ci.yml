name: CI

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, develop, dev]

jobs:
  matrix:
    name: ${{ matrix.nf }} — ${{ matrix.task }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        nf: [nrf]   # NRF has its own go.mod; add NFs here only if they have one
        # lint omitted: golangci-lint binary doesn't support Go 1.26.2 yet.
        task: [test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Lee la versión real del módulo (go 1.26.2). Fijar '1.22' aquí
          # disparaba la auto-descarga del toolchain y rompía test/build.
          go-version-file: nf/${{ matrix.nf }}/go.mod
          cache-dependency-path: nf/${{ matrix.nf }}/go.sum

      - name: Run task
        run: make -C nf/${{ matrix.nf }} ${{ matrix.task }}

  go-build:
    name: Go build — all NFs (no workspace)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build all NFs without workspace
        run: GOWORK=off go build ./nf/... ./shared/...

  nrppa-codec:
    name: shared/nrppa — golden-byte + ProcedureCode regression
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # Locks the TS 38.455 ProcedureCode values (2/4/9) and one representative
      # E-CIDMeasurementReport byte sequence so a future edit can't silently
      # reintroduce the wrong procCodes (they collided with real unrelated
      # procedures — LMF-004 fix, 2026-07-01) or desync the APER wire format.
      - name: Run shared/nrppa unit tests (race)
        run: GOWORK=off go test -race -v ./shared/nrppa/...

  ueransim-build:
    name: UERANSIM patch set — apply + compile
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Verifies every tools/ueransim/patches/*.patch (including 0041's NRPPa
      # APER codec) still applies cleanly against the pinned v3.2.8 tarball and
      # the gNB/UE/CLI compile — the CI-path equivalent of `make ueransim-build-only`.
      - run: docker build -f tools/ueransim/Dockerfile -t 5gc/ueransim:ci .

  docker:
    name: Build Docker image — ${{ matrix.nf }}
    runs-on: ubuntu-22.04
    needs: [matrix, go-build]
    strategy:
      fail-fast: false
      matrix:
        nf: [nrf, amf, ausf, bsf, lmf, nef, nssf, pcf, smf, smsf, udm, udr, upf]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: make -C nf/${{ matrix.nf }} docker

  compose-up:
    name: Smoke test — docker compose up
    runs-on: ubuntu-22.04
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/gen-pki.sh
      - run: docker compose --profile core up -d
      - run: sleep 10
      - run: docker compose ps
      - run: docker compose logs nrf
      - run: |
          # El puerto 8000 está publicado en el host. 'localhost' está en el
          # SAN del cert. La SBA exige mTLS (TS 33.501 §13), así que
          # presentamos un cert de cliente firmado por la CA (vale el del NRF,
          # tiene extendedKeyUsage=clientAuth).
          curl --fail --cacert pki/ca.crt \
            --cert pki/nrf.crt --key pki/nrf.key \
            https://localhost:8000/healthz \
            || (docker compose logs nrf && exit 1)
      - run: docker compose --profile core down -v
